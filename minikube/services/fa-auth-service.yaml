---
# fa-auth-service — Minikube (imagem local amd64)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fa-auth-service
  namespace: farm-automation
  labels:
    app: fa-auth-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fa-auth-service
  template:
    metadata:
      labels:
        app: fa-auth-service
        tier: backend
    spec:
      containers:
      - name: fa-auth-service
        image: fa-auth-service:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-uri
        - name: MONGO_DATABASE
          value: "farm_automation"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fa-admin-bff-secret
              key: JWT_SECRET
        - name: JWT_EXPIRATION
          value: "24h"
        - name: SERVER_PORT
          value: "8080"
        - name: SMTP_HOST
          value: ""
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USER
          value: ""
        - name: SMTP_PASSWORD
          value: ""
        - name: EMAIL_FROM
          value: "noreply@farmautomation.local"
        - name: FRONTEND_URL
          value: "http://localhost:8080"
        - name: ENVIRONMENT
          value: "development"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: fa-auth-service
  namespace: farm-automation
  labels:
    app: fa-auth-service
spec:
  selector:
    app: fa-auth-service
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
