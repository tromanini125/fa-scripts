---
# fa-data-consumer — Minikube (imagem local amd64)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fa-data-consumer
  namespace: farm-automation
  labels:
    app: fa-data-consumer
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fa-data-consumer
  template:
    metadata:
      labels:
        app: fa-data-consumer
        tier: backend
    spec:
      containers:
      - name: fa-data-consumer
        image: fa-data-consumer:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8086
          name: http
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-uri
        - name: MONGODB_DATABASE
          value: "farm_automation_data"
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: fa-data-consumer-rabbitmq
              key: rabbitmq-url
        - name: WATER_LEVEL_QUEUE
          value: "water-level-queue"
        - name: WATER_FLUX_QUEUE
          value: "water-flux-queue"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fa-admin-bff-secret
              key: JWT_SECRET
        - name: PORT
          value: "8086"
        livenessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: fa-data-consumer-service
  namespace: farm-automation
  labels:
    app: fa-data-consumer
spec:
  selector:
    app: fa-data-consumer
  ports:
  - protocol: TCP
    port: 8086
    targetPort: 8086
    name: http
  type: ClusterIP
