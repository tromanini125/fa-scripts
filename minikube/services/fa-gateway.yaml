---
# fa-gateway — Minikube (imagem local amd64)
apiVersion: v1
kind: ConfigMap
metadata:
  name: fa-gateway-config
  namespace: farm-automation
data:
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fa-gateway
  namespace: farm-automation
  labels:
    app: fa-gateway
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fa-gateway
  template:
    metadata:
      labels:
        app: fa-gateway
        tier: gateway
    spec:
      containers:
      - name: fa-gateway
        image: fa-gateway:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: fa-gateway-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fa-admin-bff-secret
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 25
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fa-gateway
  namespace: farm-automation
  labels:
    app: fa-gateway
spec:
  type: NodePort
  selector:
    app: fa-gateway
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30081
    protocol: TCP
    name: http